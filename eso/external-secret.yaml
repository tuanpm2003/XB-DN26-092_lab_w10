apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: api-db-secret
  namespace: demo
spec:
  refreshInterval: "10s"
  secretStoreRef:
    name: fake-store
    kind: SecretStore
  target:
    name: api-db-secret
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: /db/password