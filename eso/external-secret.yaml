apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: api-db-secret
  namespace: demo
spec:
  refreshInterval: "30s"
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: api-db-secret
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: /db/password