apiVersion: v1
kind: Pod
metadata:
  name: good-pod
  namespace: demo
spec:
  hostNetwork: false
  securityContext:
    runAsUser: 1000
  containers:
    - name: nginx
      image: nginx:1.25.3
      resources:
        limits:
          cpu: "500m"
          memory: "512Mi"
        requests:
          cpu: "250m"
          memory: "256Mi"
