# Policies App: Sync ClusterImagePolicy resources
# Sync wave -7: Deploy sau Policy Controller
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: image-policies
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-7"
spec:
  project: default

  source:
    repoURL: https://github.com/tuanpm2003/XB-DN26-092_lab_w10.git
    targetRevision: main
    path: policies

  destination:
    server: https://kubernetes.default.svc

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
